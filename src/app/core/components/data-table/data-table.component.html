<div class="table-container">
  <!-- Search Bar -->
  <mat-form-field class="search-field">
    <mat-label>Search</mat-label>
    <input
      matInput
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearch($event)"
      placeholder="Search..."
    />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <!-- Column Filters -->
  <div class="filters-container" *ngIf="filterableColumns.length > 0">
    <mat-form-field *ngFor="let column of filterableColumns">
      <mat-label>Filter {{ column.header }}</mat-label>
      <input
        matInput
        [(ngModel)]="columnFilters[column.key]"
        (ngModelChange)="onFilter()"
        [placeholder]="'Filter ' + column.header"
      />
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="data" matSort (matSortChange)="onSort($event)">
    <ng-container *ngFor="let column of columns" [matColumnDef]="column.key">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        {{ column.header }}
      </th>
      <td mat-cell *matCellDef="let row">
        <ng-container [ngSwitch]="column.type">
          <!-- Image Column -->
          <img
            *ngSwitchCase="'image'"
            [src]="row[column.key]"
            [width]="column.imageConfig?.width"
            [height]="column.imageConfig?.height"
            [style.border-radius]="column.imageConfig?.borderRadius"
            [alt]="column.key"
          />

          <!-- Actions Column -->
          <ng-container *ngSwitchCase="'actions'">
            <button mat-icon-button color="primary" (click)="onEdit.emit(row)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="onDelete.emit(row)">
              <mat-icon>delete</mat-icon>
            </button>
          </ng-container>

          <!-- Default Text Column -->
          <ng-container *ngSwitchDefault>
            {{ row[column.key] }}
          </ng-container>
        </ng-container>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [length]="totalItems"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    (page)="onPage($event)"
  ></mat-paginator>
</div>
