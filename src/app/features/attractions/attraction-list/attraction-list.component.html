<div class="container">
  <h2>Attraction List</h2>
  <div class="d-flex align-items-center justify-content-between">
    <!-- Search Input -->
    <mat-form-field
      appearance="outline"
      style="width: 300px; margin-bottom: 16px"
    >
      <mat-label>Search attractions</mat-label>
      <input
        #searchInput
        matInput
        placeholder="Search by name or email"
        (input)="onSearchChange(searchInput.value)"
      />
    </mat-form-field>
    <button
      mat-raised-button
      color="primary"
      (click)="openAddAttractionDialog()"
    >
      <mat-icon>person_add</mat-icon>
      Add Attraction
    </button>
  </div>

  <!-- Table -->
  <table
    mat-table
    [dataSource]="attractions"
    matSort
    (matSortChange)="onSortChange($event)"
    class="mat-elevation-z8"
  >
    <!-- Cover Column -->
    <ng-container matColumnDef="coverimage">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Cover</th>
      <td mat-cell *matCellDef="let attraction">
        <img
          [src]="attraction.coverimage"
          alt="avatar"
          width="40"
          height="40"
          style="border-radius: 50%"
        />
      </td>
    </ng-container>
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let attraction">{{ attraction.name }}</td>
    </ng-container>
    <!-- Details Column -->
    <ng-container matColumnDef="detail">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Details</th>
      <td
        mat-cell
        *matCellDef="let attraction"
        class="truncate-text"
        [matTooltip]="attraction.detail"
      >
        {{ attraction.detail }}
      </td>
    </ng-container>
    <!-- Latitude Column -->
    <ng-container matColumnDef="latitude">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Latitude</th>
      <td mat-cell *matCellDef="let attraction">{{ attraction.latitude }}</td>
    </ng-container>
    <!-- Longitude Column -->
    <ng-container matColumnDef="longitude">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Longitude</th>
      <td mat-cell *matCellDef="let attraction">{{ attraction.longitude }}</td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let attraction">
        <div class="d-flex algin-items-center justify-content-end">
          <button mat-icon-button color="primary" (click)="onEdit(attraction)">
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="secondary"
            (click)="onView(attraction)"
          >
            <mat-icon>visibility</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            (click)="onDelete(attraction.id)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <!-- Header and Row Definitions -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    <tr class="mat-row" *ngIf="attractions.length === 0">
      <td
        class="mat-cell"
        [attr.colspan]="displayedColumns.length"
        style="text-align: center"
      >
        No users found.
      </td>
    </tr>
  </table>

  <!-- Paginator -->
  <mat-paginator
    [length]="totalAttraction"
    [pageSize]="10"
    [pageSizeOptions]="[10, 20, 50, 100]"
    (page)="onPageChange($event)"
  ></mat-paginator>
</div>
