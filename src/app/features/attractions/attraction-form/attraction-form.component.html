<div class="p-5">
  <h2 mat-dialog-title>
    {{
      attractionForm.get("id")?.value ? "Edit Attraction" : "Add New Attraction"
    }}
  </h2>

  <div class="form-scroll-container">
    <form [formGroup]="attractionForm" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" style="width: 100%">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" required />
      </mat-form-field>

      <mat-form-field appearance="outline" style="width: 100%">
        <mat-label>Details</mat-label>
        <textarea
          matInput
          formControlName="detail"
          rows="4"
          required
        ></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline" style="width: 100%">
        <mat-label>Latitude</mat-label>
        <input matInput formControlName="latitude" type="number" required />
      </mat-form-field>

      <mat-form-field appearance="outline" style="width: 100%">
        <mat-label>Longitude</mat-label>
        <input matInput formControlName="longitude" type="number" required />
      </mat-form-field>

      <div class="avatar-upload-container">
        <label for="avatarUpload" class="upload-label"
          >Upload Cover Image</label
        >
        <input
          type="file"
          id="avatarUpload"
          accept="image/*"
          (change)="onFileSelected($event)"
          required
          class="upload-input"
        />

        <div *ngIf="selectedFileName" class="file-name">
          Selected file: {{ selectedFileName }}
        </div>

        <div
          *ngIf="attractionForm.get('coverimage')?.value"
          class="avatar-preview-wrapper"
        >
          <img
            [src]="attractionForm.get('coverimage')?.value"
            alt="coverimage"
            class="avatar-preview"
          />
        </div>

        <div
          class="mat-error text-danger mt-1"
          *ngIf="
            attractionForm.get('avatar')?.invalid &&
            attractionForm.get('avatar')?.touched
          "
        >
          Avatar is required
        </div>
      </div>

      <div
        style="
          display: flex;
          justify-content: flex-end;
          gap: 8px;
          margin-top: 16px;
        "
      >
        <button mat-button type="button" (click)="cancel()">Cancel</button>
        <button
          mat-raised-button
          color="primary"
          [disabled]="attractionForm.invalid"
          type="submit"
        >
          {{ data?.id ? "Update" : "Add" }}
        </button>
      </div>
    </form>
  </div>
</div>
