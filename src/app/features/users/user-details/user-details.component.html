<div class="p-4">
  <h2 mat-dialog-title>User Details</h2>

  <div mat-dialog-content>
    <p><strong>First Name:</strong> {{ data.fname }}</p>
    <p><strong>Last Name:</strong> {{ data.lname }}</p>
    <p><strong>Email:</strong> {{ data.email }}</p>
    <p><strong>Username:</strong> {{ data.username }}</p>

    <div *ngIf="data.avatar" style="margin-top: 10px">
      <strong>Avatar:</strong><br />
      <img
        [src]="data.avatar"
        alt="avatar"
        style="max-width: 150px; border-radius: 8px"
      />
    </div>
  </div>

  <div mat-dialog-actions class="mt-5 w-100 d-flex justify-content-end">
    <button mat-button (click)="close()">Close</button>
  </div>
</div>
